<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meeting Sign-In</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='Main_Logo-removebg-preview.png') }}">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #384839;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 900px;
            width: 100%;
        }

        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #ddd;
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            background: #f5f5f5;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: background 0.3s;
        }

        .tab.active {
            background: #4CAF50;
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        input[type="text"],
        input[type="email"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="email"]:focus {
            outline: none;
            border-color: #4CAF50;
        }

        button:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }

        .submitBtn {
            width: 100%;
            padding: 15px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .submitBtn:hover {
            background: #45a049;
        }

        .submitBtn:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }

        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
        }

        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .signed-in-list {
            margin-top: 20px;
            width: 100%;
            max-width: 800px;
        }

        .signed-in-list h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 20px;
        }

        .table-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        #signinsTable {
            width: 100%;
            border-collapse: collapse;
        }

        #signinsTable th,
        #signinsTable td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        #signinsTable th {
            background: #4CAF50;
            color: white;
            font-weight: 600;
        }

        #signinsTable tbody tr:hover {
            background: #f5f5f5;
        }

        .type-badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .type-badge.member {
            background: #4CAF50;
            color: white;
        }

        .type-badge.guest {
            background: #17a2b8;
            color: white;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4CAF50;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Meeting Sign-In</h1>
        <p style="text-align: center; color: #666; margin-bottom: 30px;">{{ today_date[5:7] }}/{{ today_date[8:10] }}/{{ today_date[0:4] }}</p>

        <div class="tabs">
            <div class="tab active">Member</div>
            <div class="tab">Guest</div>
        </div>

        <div class="tab-content active" id="member-tab">
            <div class="form-group">
                <label for="member_number">Member Number:</label>
                <input type="text" id="member_number" placeholder="Enter your member number" maxlength="10">
            </div>
            <button class="submitBtn" id="member-btn">Sign In as Member</button>
            <div id="member-message" class="message"></div>
        </div>

        <div class="tab-content" id="guest-tab">
            <div class="form-group">
                <label for="guest_name">Your Name:</label>
                <input type="text" id="guest_name" placeholder="Enter your full name">
            </div>
            <button class="submitBtn" id="guest-btn">Sign In as Guest</button>
            <div id="guest-message" class="message"></div>
        </div>

        <div class="signed-in-list">
            <h3>Today's Sign-ins</h3>
            <div class="table-container">
                <table id="signinsTable">
                    <thead>
                        <tr>
                            <th>Type</th>
                            <th>Number/Name</th>
                        </tr>
                    </thead>
                    <tbody id="signinsTableBody">
                        <!-- Sign-ins will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Loading sign-ins...</p>
        </div>
    </div>

    <script>
        // Simple test to see if JavaScript executes
        console.log('Script loaded successfully');
        alert('JavaScript is working! If you see this alert, JavaScript is executing.');
    </script>
</body>
</html>
